# Deploy Zizi English Class to GitHub Pages with API keys injected
# from repository Secrets (never committed to git).
#
# Repo → Settings → Secrets and variables → Actions:
#   GOOGLE_TTS_KEY          (optional)
#   OPENROUTER_API_KEY      (optional)
#   AZURE_SPEECH_KEY        (optional)
#   AZURE_SPEECH_REGION     (optional, default eastasia)
#   ZIZI_VOICE_PROVIDER     (optional: azure | iphone | google)
#
# Repo → Settings → Pages → Build and deployment → Source: GitHub Actions

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject secrets into js/config.js
        env:
          GOOGLE_TTS_KEY: ${{ secrets.GOOGLE_TTS_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          AZURE_SPEECH_KEY: ${{ secrets.AZURE_SPEECH_KEY }}
          AZURE_SPEECH_REGION: ${{ secrets.AZURE_SPEECH_REGION }}
          ZIZI_VOICE_PROVIDER: ${{ secrets.ZIZI_VOICE_PROVIDER }}
        run: |
          python3 << 'PY'
          import json
          import os

          def j(name):
              return json.dumps(os.environ.get(name) or "")

          region = os.environ.get("AZURE_SPEECH_REGION") or "eastasia"
          provider = (os.environ.get("ZIZI_VOICE_PROVIDER") or "").strip()

          content = (
              "// Generated by GitHub Actions from repository Secrets\n"
              "// Real keys exist only in the Pages artifact, not in git.\n"
              "window.ZIZI_SECRETS = {\n"
              f"    googleTtsKey: {j('GOOGLE_TTS_KEY')},\n"
              f"    openRouterKey: {j('OPENROUTER_API_KEY')},\n"
              f"    azureSpeechKey: {j('AZURE_SPEECH_KEY')},\n"
              f"    azureSpeechRegion: {json.dumps(region)},\n"
              f"    voiceProvider: {json.dumps(provider)}\n"
              "};\n"
          )
          with open("js/config.js", "w", encoding="utf-8") as f:
              f.write(content)

          flags = [n for n in ("GOOGLE_TTS_KEY", "OPENROUTER_API_KEY", "AZURE_SPEECH_KEY") if os.environ.get(n)]
          print("Injected secrets:", ", ".join(flags) if flags else "(none — site still deploys)")
          PY

      - name: Prepare site folder
        run: |
          mkdir -p _site
          cp index.html style.css README.md _site/
          cp -r js _site/js
          STAMP=$(date +%Y%m%d%H%M%S)
          sed -i "s/ZIZI_CACHE_BUST/${STAMP}/g" _site/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
