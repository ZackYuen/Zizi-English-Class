<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>孜孜學英文</title>
</head>
<body>
    <div id="debug" style="color:red;">載入中...</div>
    <div id="display-panel">
        <canvas id="letter-canvas" width="300" height="300" style="border:1px solid #000; touch-action:none;"></canvas>
        <button onclick="window.checkAndTransform()">✨ 變魔術</button>
    </div>

    <script>
        // 確保所有函數都掛載喺 window 物件，防止找不到變數
        window.checkAndTransform = function() {
            alert("變魔術功能啟動！");
            console.log("變魔術執行成功");
        };

        document.getElementById('debug').innerText = "✅ Script 已成功載入";
        document.getElementById('debug').style.color = "green";
    </script>
</body>
</html>
