<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>孜孜學英文 - Jolly Phonics 分組版</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

<div id="start-overlay"><button id="start-btn" onclick="start()">🚀 開始啦！</button></div>

<h1 style="color:#ff595e;margin:5px">🌟 孜孜學英文 🌟</h1>
<div id="app">
    <div id="msg">由綠色點出發，畫到尾為止！</div>
    <div id="canvas-wrapper"><canvas id="cvs" width="300" height="300"></canvas></div>
    <div class="controls">
        <button class="btn btn-clear" onclick="reset()">🧽 抹走</button>
        <button class="btn btn-magic" onclick="magic()">✨ 變魔術</button>
    </div>
</div>

<!-- 分組標籤 (Tabs) -->
<div id="group-tabs"></div>

<!-- 字母鍵盤 (會根據分組動態更新) -->
<div id="kb"></div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
