<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>孜孜學英文 🚀</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <div class="header">
        <h1>🌟 孜孜學英文 🌟</h1>
        <p class="subtitle">寫出 <span id="current-letter" class="highlight">A</span>，變魔術！</p>
    </div>
    
    <div id="display-panel">
        <div id="canvas-container">
            <canvas id="tracing-layer" width="300" height="300"></canvas>
            <canvas id="letter-canvas" width="300" height="300"></canvas>
        </div>
        
        <div class="controls">
            <button class="kid-btn btn-clear" onclick="clearCanvas()">
                <span class="icon">🧽</span> 抹乾淨
            </button>
            <button class="kid-btn btn-magic" onclick="checkAndTransform()">
                <span class="icon">✨</span> 變魔術
            </button>
            <button class="kid-btn btn-mic" onclick="startListening()">
                <span class="icon">🎤</span> 我識讀
            </button>
        </div>
    </div>

    <div id="grid-container"></div>

    <script src="script.js"></script>
</body>
</html>
