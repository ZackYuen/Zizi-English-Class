<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>孜孜學英文 🚀</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Comic Sans MS', sans-serif; background-color: #ffecd2; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; touch-action: none; user-select: none; }
        h1 { color: #ff595e; margin: 5px 0; font-size: 26px; text-shadow: 2px 2px 0px #fff; }
        
        #display-panel { background-color: #fff; border-radius: 25px; box-shadow: 0 8px 0 #e0e0e0; width: 100%; max-width: 400px; padding: 15px; text-align: center; border: 6px solid #8ac926; box-sizing: border-box; }
        
        /* 即時分數顯示區 */
        #realtime-score { font-size: 32px; font-weight: bold; color: #ff595e; margin-bottom: 5px; transition: color 0.3s; }
        #status-text { font-size: 14px; color: #1982c4; font-weight: bold; height: 20px; margin-bottom: 5px; }
        
        #canvas-wrapper { position: relative; width: 300px; height: 300px; margin: 0 auto; background: #f8f9fa; border: 4px dashed #1982c4; border-radius: 20px; transition: transform 0.6s ease; }
        #tracing-layer, #letter-canvas { position: absolute; top: 0; left: 0; width: 300px; height: 300px; }
        #tracing-layer { pointer-events: none; z-index: 1; }
        #letter-canvas { z-index: 2; touch-action: none; }
        
        .controls { display: flex; justify-content: center; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .kid-btn { border: none; padding: 12px 18px; font-size: 18px; border-radius: 18px; cursor: pointer; font-weight: bold; color: white; box-shadow: 0 5px 0 rgba(0,0,0,0.2); }
        .kid-btn:active { transform: translateY(5px); box-shadow: none; }
        
        #grid-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; width: 100%; max-width: 400px; margin-top: 20px; }
        .key { background: white; border: 4px solid #ffca3a; border-radius: 15px; padding: 15px 0; text-align: center; font-size: 26px; font-weight: bold; color: #ff595e; cursor: pointer; box-shadow: 0 5px 0 #e0a900; }
        .key:active { transform: translateY(5px); box-shadow: none; background: #fff3cd; }
    </style>
</head>
<body>

    <h1>🌟 孜孜學英文 🌟</h1>
    
    <div id="display-panel">
        <div id="realtime-score">完成度: 0%</div>
        <div id="status-text">由綠色點出發，跟住虛線畫！</div>
        
        <div id="canvas-wrapper">
            <canvas id="tracing-layer" width="300" height="300"></canvas>
            <canvas id="letter-canvas" width="300" height="300"></canvas>
        </div>
        
        <div class="controls">
            <button class="kid-btn" style="background-color:#ff595e;" onclick="window.clearCanvas()">🧽 抹走</button>
            <button class="kid-btn" style="background-color:#8ac926;" onclick="window.checkAndTransform()">✨ 變魔術</button>
            <button class="kid-btn" style="background-color:#1982c4;" onclick="window.startListening()">🎤 我識讀</button>
        </div>
    </div>

    <div id="grid-container"></div>

    <script>
        window.onerror = function(msg, url, line) {
            console.error("錯誤: " + msg + " (行 " + line + ")");
            return true;
        };

        const wordsData = [
            { l: 'A', w: 'ant', sp: 'A. A, N, T. Ant.', emoji: '🐜', startX: 150, startY: 60 }, 
            { l: 'B', w: 'bug', sp: 'B. B, U, G. Bug.', emoji: '🐛', startX: 105, startY: 60 }, 
            { l: 'C', w: 'cat', sp: 'C. C, A, T. Cat.', emoji: '🐱', startX: 195, startY: 85 }, 
            { l: 'D', w: 'dog', sp: 'D. D, O, G. Dog.', emoji: '🐶', startX: 105, startY: 60 }, 
            { l: 'E', w: 'egg', sp: 'E. E, G, G. Egg.', emoji: '🥚', startX: 105, startY: 60 }, 
            { l: 'F', w: 'fox', sp: 'F. F, O, X. Fox.', emoji: '🦊', startX: 105, startY: 60 }
        ];
        let currentIndex = 0;

        const canvas = document.getElementById('letter-canvas');
        const ctx = canvas.getContext('2d');
        const tracingLayer = document.getElementById('tracing-layer');
        const tCtx = tracingLayer.getContext('2d');
        const wrapper = document.getElementById('canvas-wrapper');
        const statusText = document.getElementById('status-text');
        const scoreText = document.getElementById('realtime-score');

        ctx.lineWidth = 30; 
        ctx.lineCap = 'round'; 
        ctx.lineJoin = 'round';
        ctx.strokeStyle = '#ff9f1c'; 

        function initKeyboard() {
            const grid = document.getElementById('grid-container');
            grid.innerHTML = '';
            wordsData.forEach((item, index) => {
                const key = document.createElement('div');
                key.className = 'key';
                key.innerText = item.l;
                key.onclick = () => loadWord(index);
                grid.appendChild(key);
            });
        }

        // --- 流水虛線動畫 (低耗能版本 20FPS) ---
        let animInterval;
        let dashOffset = 0;

        function startTracingAnimation() {
            if(animInterval) clearInterval(animInterval);
            
            animInterval = setInterval(() => {
                tCtx.clearRect(0, 0, 300, 300);
                const currentItem = wordsData[currentIndex];
                
                // 流水虛線
                tCtx.font = 'bold 220px Arial';
                tCtx.textAlign = 'center'; 
                tCtx.textBaseline = 'middle';
                tCtx.setLineDash([15, 20]); 
                tCtx.lineDashOffset = -dashOffset; 
                tCtx.strokeStyle = '#cccccc'; 
                tCtx.lineWidth = 6;
                tCtx.strokeText(currentItem.l, 150, 160);
                
                // 起筆點 (唔郁嘅綠色圓點)
                tCtx.setLineDash([]); 
                tCtx.beginPath();
                tCtx.arc(currentItem.startX, currentItem.startY, 16, 0, Math.PI * 2);
                tCtx.fillStyle = '#06d6a0';
                tCtx.fill();
                
                tCtx.fillStyle = '#ffffff';
                tCtx.font = 'bold 18px Arial';
                tCtx.fillText('1', currentItem.startX, currentItem.startY + 2);
                
                dashOffset += 2; // 流動速度
            }, 50);
        }

        function loadWord(index) {
            currentIndex = index;
            window.clearCanvas();
        }

        window.clearCanvas = function() {
            ctx.clearRect(0, 0, 300, 300);
            updateRealtimeScore(true); // 強制重置 0%
            startTracingAnimation();
            statusText.innerText = "由綠色點出發，跟住虛線畫！";
        };

        // --- 即時分數計算 (加入限速器 Throttle) ---
        let lastCalcTime = 0;
        
        function calculateCoverage() {
            const guideData = tCtx.getImageData(0, 0, 300, 300).data;
            const userData = ctx.getImageData(0, 0, 300, 300).data;
            let totalGuidePixels = 0;
            let coveredPixels = 0;

            for(let i = 3; i < guideData.length; i += 4) {
                if(guideData[i] > 30) {
                    totalGuidePixels++;
                    if(userData[i] > 50) coveredPixels++;
                }
            }
            if(totalGuidePixels === 0) return 0;
            return Math.round((coveredPixels / totalGuidePixels) * 100);
        }

        function updateRealtimeScore(forceZero = false) {
