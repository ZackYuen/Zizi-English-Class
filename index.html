<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>孜孜學英文</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #ffecd2; display: flex; flex-direction: column; align-items: center; touch-action: none; }
        #canvas-container { position: relative; width: 300px; height: 300px; border: 4px dashed #1982c4; background: #fff; margin: 20px 0; }
        #letter-canvas { position: absolute; top: 0; left: 0; z-index: 2; touch-action: none; }
        .btn { padding: 20px 40px; font-size: 20px; border-radius: 20px; background: #8ac926; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div id="canvas-container">
        <canvas id="letter-canvas" width="300" height="300"></canvas>
    </div>
    <button class="btn" onclick="magicTrigger()">✨ 變魔術</button>

    <script>
        // 確保函數掛載到 window，iPhone 一定搵到
        window.magicTrigger = function() {
            alert("變魔術功能已啟動！");
            
            // 檢查畫布內容
            const canvas = document.getElementById('letter-canvas');
            const ctx = canvas.getContext('2d');
            const imgData = ctx.getImageData(0, 0, 300, 300);
            
            // 簡單檢查有冇像素
            let hasDrawn = false;
            for(let i=3; i<imgData.data.length; i+=4) { 
                if(imgData.data[i] > 50) { hasDrawn = true; break; } 
            }
            
            if(!hasDrawn) {
                alert("請先寫字！");
                return;
            }
            
            // 觸發效果
            confetti();
            alert("魔術成功！");
            ctx.clearRect(0, 0, 300, 300);
        };

        // 觸控邏輯 (防止 iPhone 錯誤崩潰)
        const canvas = document.getElementById('letter-canvas');
        const ctx = canvas.getContext('2d');
        ctx.lineWidth = 20;
        ctx.lineCap = 'round';
        ctx.strokeStyle = '#ff9f1c';

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const pos = getPos(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const pos = getPos(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        }, { passive: false });
    </script>
</body>
</html>
