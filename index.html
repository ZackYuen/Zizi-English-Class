<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>孜孜學英文 - 統一選單版</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

<!-- 統一主選單 (Home Menu) -->
<div id="home-menu" class="is-open" style="display:flex;">
    <h1>🌟 孜孜拼音大冒險</h1>
    <p>請選擇你想玩嘅模式：</p>

    <div class="home-menu-actions">
        <button type="button" class="home-btn-standard" onclick="enterMode('standard')">✍️ 基礎描字模式</button>
        <button type="button" class="home-btn-camera" onclick="enterMode('camera')">📸 探索魔鏡模式</button>
        <button type="button" class="home-btn-game" onclick="enterMode('game')">🎮 聽音大挑戰</button>
        <button type="button" class="home-btn-settings" onclick="openSettings()">⚙️ 設定 API Keys</button>
    </div>
</div>

<!-- 統一返回主頁按鈕 -->
<button type="button" id="back-to-home-btn" onclick="backToHome()" style="display:none;">🏠 返回主選單</button>

<div class="top-bar" id="standard-top-bar" style="display:none;">
    <h2 style="color:#ff595e; margin:0;">🌟 孜孜學英文</h2>
</div>

<!-- 1. 基礎模式與畫布區域 -->
<div id="start-overlay" style="display:none;" aria-hidden="true"></div>
<div id="app" style="display:none;">
    <div id="msg">由綠色點出發，畫到尾為止！</div>
    <div id="canvas-wrapper"><canvas id="cvs" width="300" height="300"></canvas></div>
    <div class="controls">
        <button type="button" class="btn btn-clear" onclick="resetCanvas()">🧽 抹走</button>
        <button type="button" class="btn btn-magic" onclick="magic()">✨ 變魔術</button>
        <button type="button" class="btn" id="btn-re-cam" style="background:#ffca3a; color:#1d3557; display:none;" onclick="openCamera()">📸 影下一個</button>
    </div>
</div>
<div id="standard-ui" style="display:none;">
    <div id="group-tabs"></div>
    <div id="kb"></div>
</div>

<!-- 2. 相機模式區域 -->
<div id="camera-ui-container" style="display:none;"></div>
<div id="camera-overlay" style="display:none;">
    <video id="camera-video" playsinline webkit-playsinline muted autoplay></video>

    <canvas id="crop-canvas" width="300" height="300"></canvas>

    <div id="camera-controls">
        <button type="button" id="capture-btn" onclick="takePhoto()">📸 影低佢！</button>
        <button type="button" id="confirm-crop-btn" onclick="confirmCrop()" style="display:none;">✅ 確定</button>
        <button type="button" id="close-camera-btn" onclick="backToHome()">❌ 取消</button>
        <button type="button" id="cancel-analyze-btn" style="display:none;">🛑 取消分析</button>
    </div>

    <div id="loading-msg" style="display:none;">聯絡緊 AI 睇下係咩嚟... 🤖</div>
</div>

<!-- 3. 聽音大挑戰遊戲區域 -->
<div id="game-overlay" style="display:none;">
    <h2>🎧 聽音大挑戰</h2>
    <div id="game-msg">睇下係咩圖案，聽下係咩音！</div>
    <button type="button" id="game-speaker" onclick="playGameSound()">
        <span id="game-emoji-display">🔊</span>
        <span style="font-size:18px; color:#1d3557; margin-top:5px; font-weight:bold;">撳我重聽</span>
    </button>
    <div class="game-answers">
        <button type="button" id="btn-A" class="game-ans-btn" onclick="checkAnswer('A')"></button>
        <button type="button" id="btn-E" class="game-ans-btn" onclick="checkAnswer('E')"></button>
        <button type="button" id="btn-I" class="game-ans-btn" onclick="checkAnswer('I')"></button>
    </div>
</div>

<!-- 設定彈出視窗 -->
<div id="settings-modal" style="display:none;">
    <div class="settings-card">
        <h2>⚙️ 設定 API Keys</h2>

        <label for="input-google-tts">Google TTS (語音及發聲):</label>
        <input type="password" id="input-google-tts" placeholder="輸入 Google API Key" autocomplete="off" autocapitalize="off" spellcheck="false">

        <label for="input-openrouter">OpenRouter (相機認字):</label>
        <input type="password" id="input-openrouter" placeholder="輸入 OpenRouter API Key" autocomplete="off" autocapitalize="off" spellcheck="false">

        <div class="settings-actions">
            <button type="button" class="settings-cancel" onclick="closeSettings()">取消</button>
            <button type="button" class="settings-save" onclick="saveSettings()">💾 儲存</button>
        </div>
    </div>
</div>

<script src="data.js"></script>
<script src="state.js"></script>
<script src="ui.js"></script>
<script src="canvas.js"></script>
<script src="camera.js"></script>
<script src="game.js"></script>
<script src="router.js"></script>
</body>
</html>
