<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>孜孜學英文 🚀</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        body { font-family: 'Comic Sans MS', sans-serif; background-color: #ffecd2; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; touch-action: none; user-select: none; overscroll-behavior: none; }
        h1 { color: #ff595e; margin: 5px 0; font-size: 26px; text-shadow: 2px 2px 0px #fff; }
        
        #display-panel { background-color: #fff; border-radius: 25px; box-shadow: 0 8px 0 #e0e0e0; width: 100%; max-width: 400px; padding: 15px; text-align: center; border: 6px solid #8ac926; box-sizing: border-box; }
        
        #realtime-score { font-size: 30px; font-weight: bold; color: #ff595e; margin-bottom: 5px; transition: color 0.3s; }
        #status-text { font-size: 15px; color: #1982c4; font-weight: bold; height: 20px; margin-bottom: 5px; }
        
        #canvas-wrapper { position: relative; width: 300px; height: 300px; margin: 0 auto; background: #f8f9fa; border: 4px dashed #1982c4; border-radius: 20px; overflow: hidden; transition: transform 0.6s ease; }
        
        .controls { display: flex; justify-content: center; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .kid-btn { border: none; padding: 12px 18px; font-size: 18px; border-radius: 18px; cursor: pointer; font-weight: bold; color: white; box-shadow: 0 5px 0 rgba(0,0,0,0.2); transition: transform 0.1s; }
        .kid-btn:active { transform: translateY(5px); box-shadow: none; }
        
        #grid-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; width: 100%; max-width: 400px; margin-top: 20px; }
        .key { background: white; border: 4px solid #ffca3a; border-radius: 15px; padding: 15px 0; text-align: center; font-size: 26px; font-weight: bold; color: #ff595e; cursor: pointer; box-shadow: 0 5px 0 #e0a900; }
        .key:active { transform: translateY(5px); box-shadow: none; background: #fff3cd; }
    </style>
</head>
<body>

    <h1>🌟 孜孜學英文 🌟</h1>
    
    <div id="display-panel">
        <div id="realtime-score">完成度: 0%</div>
        <div id="status-text">由綠色呼吸點出發！</div>
        
        <div id="canvas-wrapper"></div>
        
        <div class="controls">
            <button class="kid-btn" style="background-color:#ff595e;" onclick="actionClear()">🧽 抹走</button>
            <button class="kid-btn" style="background-color:#8ac926;" onclick="actionMagic()">✨ 變魔術</button>
            <button class="kid-btn" style="background-color:#1982c4;" onclick="actionListen()">🎤 我識讀</button>
        </div>
    </div>

    <div id="grid-container"></div>

            initKeyboard();
            actionClear();

            if (!isMagicMode) {
                drawAnimatedGuide(); 
                image(pgGuide, 0, 0); 
                image(pgDraw, 0, 0);  
                
                if (mouseIsPressed && frameCount % 30 === 0) {
                    calcCoverage();
                }
            } else {
                textAlign(CENTER, CENTER);
                textSize(120);
                text(wordsData[currentIndex].emoji, 150, 130);
                textSize(40);
                fill('#1d3557');
                textStyle(BOLD);
                text(wordsData[currentIndex].w.toUpperCase(), 150, 230);
            }
        }

            pgGuide.text(currentItem.l, 150, 165);

            pgGuide.fill('#06d6a0');
